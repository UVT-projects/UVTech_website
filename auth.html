<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autentificare — UVTech Fest 2026</title>
  <link rel="stylesheet" href="styles/styles2.css">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body>

  <div class="auth-center">
    <div class="auth-form-wrap">

      <a href="index.html" class="auth-brand">
        <span class="brand-name">UVTech Fest</span>
        <span class="brand-year">2026</span>
      </a>

      <h1>Autentificare</h1>
      <p class="auth-sub">Introdu datele contului tau UVT.</p>

      <form action="index.html" method="get" class="auth-form">

        <div class="form-group">
          <label for="auth-email">Adresa de email</label>
          <input type="email" id="auth-email" name="email" required placeholder="tu@e-uvt.ro">
        </div>

        <div class="form-group">
          <label for="auth-password">Parola</label>
          <input type="password" id="auth-password" name="password" required placeholder="Parola ta">
        </div>

        <button type="submit" class="btn-auth">Intra in cont</button>

      </form>

      <p class="auth-switch">
        Nu ai cont? <a href="contact.html">Inscrie-te la festival</a>
      </p>

    </div>
  </div>

</body>
</html>
